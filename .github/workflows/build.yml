name: Build AdoetzGPT 3.5 APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      # 3. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Cache Gradle
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 6. Build frontend
      - name: Build frontend Svelte SPA
        run: npm run build
        env:
          NODE_ENV: production

      # 7. Sync Capacitor Android
      - name: Sync Capacitor Android
        run: npx cap sync android

      # 8. Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: 'android'

      # 9. Set up Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 10. Build Debug APK
      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        working-directory: 'android'

      # 11. Build Release APK (unsigned unless keystore provided)
      - name: Set up Release Keystore
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Keystore secret detected, decoding..."
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            cat > keystore.properties << EOF
            storeFile=keystore.jks
            storePassword=$KEYSTORE_PASSWORD
            keyAlias=$KEY_ALIAS
            keyPassword=$KEY_PASSWORD
            EOF
          else
            echo "No KEYSTORE_BASE64 secret configured; compiling as unsigned release."
          fi

      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        working-directory: 'android'

      # 12. Get APK info
      - name: Get APK info (Debug)
        if: ${{ github.event.inputs.build_type != 'release' }}
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          APK_NAME=$(basename "$APK_PATH")
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "APK_PATH=android/$APK_PATH" >> $GITHUB_ENV
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV
          echo "✅ Debug APK: $APK_NAME ($APK_SIZE)"
        working-directory: 'android'

      - name: Get APK info (Release)
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_NAME=$(basename "$APK_PATH")
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "APK_PATH=android/$APK_PATH" >> $GITHUB_ENV
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV
          echo "✅ Release APK: $APK_NAME ($APK_SIZE)"
        working-directory: 'android'

      # 13. Upload APK artifact
      - name: Upload Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: AdoetzGPT-3.5-debug-${{ github.run_number }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Upload Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: AdoetzGPT-3.5-release-${{ github.run_number }}
          path: ${{ env.APK_PATH }}
          retention-days: 90

      # 14. GitHub Release (release builds on main)
      - name: Create GitHub Release
        if: ${{ github.event.inputs.build_type == 'release' && github.ref == 'refs/heads/main' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.5.${{ github.run_number }}
          name: "AdoetzGPT 3.5 v3.5.${{ github.run_number }}"
          body: |
            ## AdoetzGPT 3.5 — v3.5.${{ github.run_number }}

            ### What's included
            - Beautiful Android client overlay for remote Open WebUI server backend configuration.
            - Transparent native background voice streaming (Microphone Foreground Service).
            - Custom WebView configuration with high-priority rendering and state retention.
            - External link handling (intercepted and routed natively to system browser).
            - Responsive safe-area padding layout compatibility.

            ### APK
            - **File**: ${{ env.APK_NAME }}
            - **Size**: ${{ env.APK_SIZE }}
            - **Commit**: ${{ github.sha }}
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 15. Build Summary
      - name: Build Summary
        if: always()
        run: |
          echo "## 📱 AdoetzGPT 3.5 Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK Name | ${{ env.APK_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | ${{ env.APK_SIZE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download the APK from the **Artifacts** section below." >> $GITHUB_STEP_SUMMARY
